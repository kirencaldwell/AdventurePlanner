name: Validate Add-on

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Add-on Configuration
        uses: home-assistant/actions/addon-linter@master
        with:
          path: "./"
